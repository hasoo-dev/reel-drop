name: video_downloder
description: "A Socail Media App whihc is abouy the download the universallt download the Video in brillent quality"
 
publish_to: 'none'  
 
version: 1.0.0+1

environment:
  sdk: ^3.10.7
 
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  animate_do: 
  smooth_page_indicator: 
  dio:
  flutter_bloc: ^8.1.6
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  gal: ^2.3.2
  equatable: ^2.0.5
  flutter_secure_storage: ^9.2.2
  logger: 
  device_preview:
  http: ^1.2.2
  speech_to_text: ^7.3.0 
  another_flushbar: ^1.12.32
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  
  flutter_lints: ^6.0.0

 
flutter:
 
  uses-material-design: true

 
  assets:
    - assets/icons/
    - assets/screenshots/

  
  fonts:
    - family: lufga
      fonts:
        - asset: fonts/LufgaBlack.ttf
          weight: 900
        - asset: fonts/LufgaBold.ttf
          weight: 800
        - asset: fonts/LufgaRegular.ttf
          weight: 400
        - asset: fonts/LufgaMedium.ttf
          weight: 500
    - family: beba
      fonts:
        - asset: fonts/BebasNeueRegular.ttf
          weight: 400
         
         


         
     
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
